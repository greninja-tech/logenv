name: log-analysis-incident-response
version: "1.0.0"
description: >
  Autonomous Log Analysis & Incident Response Environment.
  Simulates real-world DevOps/SOC scenarios where an agent must analyze
  system logs, identify root causes, classify incidents, and take
  corrective actions. Used in production-grade SRE and cybersecurity workflows.
tags:
  - openenv
  - devops
  - incident-response
  - log-analysis
  - soc
  - real-world

author: "LogAnalysisEnv Team"
license: MIT

observation_space:
  type: object
  description: >
    Structured observation containing visible log entries, system metrics,
    active alerts, filtered log results, service inspection details,
    and action history.
  properties:
    step:
      type: integer
      description: Current step number
    visible_logs:
      type: array
      description: Sliding window of log entries (timestamp, level, service, message)
    system_metrics:
      type: object
      description: CPU%, memory%, disk%, active connections, request rate, error rate
    active_alerts:
      type: array
      description: Triggered alerts with severity, service, and message
    filtered_logs:
      type: array
      description: Logs matching the last filter_logs keyword search
    service_details:
      type: object
      description: Detailed info from the last inspect_service call
    actions_taken:
      type: array
      description: History of actions taken this episode
    task_description:
      type: string
      description: The task objective and context
    available_actions:
      type: array
      description: List of valid action types
    message:
      type: string
      description: System feedback from the last action

action_space:
  type: object
  description: Discrete set of investigation and remediation actions.
  actions:
    filter_logs:
      description: Search all logs for a keyword
      parameters:
        keyword: string
    inspect_service:
      description: Deep-dive log and error count for a specific service
      parameters:
        service: string
    mark_root_cause:
      description: Declare the identified root cause of the incident
      parameters:
        cause:
          type: string
          enum: [oom_kill, memory_leak, misconfigured_circuit_breaker, network_partition,
                 disk_full, deadlock, dependency_failure]
    classify_issue:
      description: Classify the incident type
      parameters:
        classification:
          type: string
          enum: [infrastructure_failure, application_bug, configuration_error,
                 network_issue, security_incident, capacity_issue, dependency_failure]
    resolve_incident:
      description: Submit final resolution (ends episode)
      parameters:
        target:
          type: string
          description: "Format: action_type:service_name (e.g. restart_service:api-server)"

reward_space:
  type: float
  range: [-0.2, 0.5]
  description: >
    Per-step reward. Positive for correct investigative actions, root cause
    identification, classification, and resolution. Negative for wrong actions
    and destructive behaviors. Final grader scores 0.0–1.0.

tasks:
  - task_id: task1
    name: "Simple Server OOM Crash"
    difficulty: easy
    max_steps: 15
    description: >
      A web server crashes due to OOM kill. Logs are clean and the root cause
      is obvious. Agent must identify the OOM kill, classify as infrastructure
      failure, and restart the api-server.
    ground_truth:
      root_cause: oom_kill
      classification: infrastructure_failure
      resolution: restart_service:api-server

  - task_id: task2
    name: "Memory Leak in Microservices"
    difficulty: medium
    max_steps: 20
    description: >
      A memory leak in the session-manager service causes gradual degradation.
      Multiple services report symptoms. Agent must filter logs, inspect services,
      and identify the correct root cause despite a postgres red herring.
    ground_truth:
      root_cause: memory_leak
      classification: application_bug
      resolution: restart_service:session-manager

  - task_id: task3
    name: "Distributed Cascading Failure"
    difficulty: hard
    max_steps: 30
    description: >
      A misconfigured circuit breaker (threshold=5 instead of 50) in order-service
      causes a cascading failure across the entire system. Multiple red herrings:
      network blip, postgres replica lag, user-service memory spike. Agent must
      cross-reference 4+ services and read config change logs.
    ground_truth:
      root_cause: misconfigured_circuit_breaker
      classification: configuration_error
      resolution: scale_service:order-service

  - task_id: task4
    name: "Disk Full — Log Rotation Failure"
    difficulty: easy-medium
    max_steps: 15
    description: >
      Log rotation daemon fails silently, filling the disk and crashing postgres
      writes. Agent must identify the disk_full root cause and restart log-rotator.
    ground_truth:
      root_cause: disk_full
      classification: infrastructure_failure
      resolution: restart_service:log-rotator

  - task_id: task5
    name: "Payment Service Deadlock"
    difficulty: medium
    max_steps: 20
    description: >
      Concurrent transactions deadlock the payment service. Red herring: a network
      blip that looks like the culprit. Agent must identify deadlock and restart
      payment-service.
    ground_truth:
      root_cause: deadlock
      classification: application_bug
      resolution: restart_service:payment-service

  - task_id: task6
    name: "Third-Party Dependency Failure"
    difficulty: medium-hard
    max_steps: 20
    description: >
      A bad deploy breaks the payment gateway SDK. Agent must distinguish between
      external dependency failure vs internal bugs and apply a rollback.
    ground_truth:
      root_cause: dependency_failure
      classification: dependency_failure
      resolution: rollback_deploy:checkout-service

  - task_id: task7
    name: "Network Partition — Split Brain"
    difficulty: hard
    max_steps: 30
    description: >
      Redis cluster splits into two halves. Data diverges across nodes. Multiple
      red herrings including CPU spikes and unrelated service restarts. Agent must
      trace network partition and restart redis-cluster.
    ground_truth:
      root_cause: network_partition
      classification: infrastructure_failure
      resolution: restart_service:redis-cluster

baseline_scores:
  task1: 0.99
  task2: 0.99
  task3: 0.98
  task4: 0.99
  task5: 0.99
  task6: 0.99
  task7: 0.97
  average: 0.99

environment_interface:
  reset_endpoint: "POST /reset"
  step_endpoint: "POST /step"
  state_endpoint: "GET /state/{task_id}"
  grade_endpoint: "GET /grade/{task_id}"
  health_endpoint: "GET /health"

deployment:
  platform: huggingface-spaces
  framework: docker
  port: 7860
  memory_gb: 4
  cpu_vcpu: 2